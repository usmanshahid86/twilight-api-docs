                        \ `http`, `https`, or no scheme, one can optionally set up\
                        \ a type\nserver that maps type URLs to message definitions\
                        \ as follows:\n\n* If no scheme is provided, `https` is assumed.\n\
                        * An HTTP GET on the URL must yield a [google.protobuf.Type][]\n\
                        \  value in binary format, or produce an error.\n* Applications\
                        \ are allowed to cache lookup results based on the\n  URL,\
                        \ or have them precompiled into a binary to avoid any\n  lookup.\
                        \ Therefore, binary compatibility needs to be preserved\n\
                        \  on changes to types. (Use versioned type names to manage\n\
