        '200':
          description: A successful response.
          schema:
            type: object
            properties:
              denom_traces:
                type: array
                items:
                  type: object
                  properties:
                    path:
                      type: string
                      description: 'path defines the chain of port/channel identifiers
                        used for tracing the

                        source of the fungible token.'
                    base_denom:
                      type: string
                      description: base denomination of the relayed fungible token.
                  description: 'DenomTrace contains the base denomination for ICS20
                    fungible tokens and the

                    source tracing information path.'
                description: denom_traces returns all denominations trace information.
              pagination:
                description: pagination defines the pagination in the response.
                type: object
                properties:
                  next_key:
                    type: string
                    format: byte
                    title: 'next_key is the key to be passed to PageRequest.key to

                      query the next page most efficiently'
                  total:
                    type: string
                    format: uint64
                    title: 'total is total number of results available if PageRequest.count_total

                      was set, its value is undefined otherwise'
            description: 'QueryConnectionsResponse is the response type for the Query/DenomTraces
              RPC

              method.'
