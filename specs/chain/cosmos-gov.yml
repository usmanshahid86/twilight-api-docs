swagger: '2.0'
info:
  title: HTTP API Console — cosmos-gov
  name: ''
  description: ''
paths:
  /cosmos/gov/v1beta1/params/{params_type}:
    get:
      summary: Params queries all parameters of the gov module.
      operationId: CosmosGovV1Beta1Params
      responses:
        '200':
          description: A successful response.
          schema:
            type: object
            properties:
              voting_params:
                description: voting_params defines the parameters related to voting.
                type: object
                properties:
                  voting_period:
                    type: string
                    description: Length of the voting period.
              deposit_params:
                description: deposit_params defines the parameters related to deposit.
                type: object
                properties:
                  min_deposit:
                    type: array
                    items:
                      type: object
                      properties:
                        denom:
                          type: string
                        amount:
                          type: string
                      description: 'Coin defines a token with a denomination and an
                        amount.


                        NOTE: The amount field is an Int which implements the custom
                        method

                        signatures required by gogoproto.'
                    description: Minimum deposit for a proposal to enter voting period.
                  max_deposit_period:
                    type: string
                    description: "Maximum period for Atom holders to deposit on a\
                      \ proposal. Initial value: 2\n months."
              tally_params:
                description: tally_params defines the parameters related to tally.
                type: object
                properties:
                  quorum:
                    type: string
                    format: byte
                    description: "Minimum percentage of total stake needed to vote\
                      \ for a result to be\n considered valid."
                  threshold:
                    type: string
                    format: byte
                    description: 'Minimum proportion of Yes votes for proposal to
                      pass. Default value: 0.5.'
                  veto_threshold:
                    type: string
                    format: byte
                    description: "Minimum value of Veto votes to Total votes ratio\
                      \ for proposal to be\n vetoed. Default value: 1/3."
            description: QueryParamsResponse is the response type for the Query/Params
              RPC method.
