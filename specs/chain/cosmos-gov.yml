                    \ message along with a\nURL that describes the type of the serialized\
                    \ message.\n\nProtobuf library provides support to pack/unpack\
                    \ Any values in the form\nof utility functions or additional generated\
                    \ methods of the Any type.\n\nExample 1: Pack and unpack a message\
                    \ in C++.\n\n    Foo foo = ...;\n    Any any;\n    any.PackFrom(foo);\n\
                    \    ...\n    if (any.UnpackTo(&foo)) {\n      ...\n    }\n\n\
                    Example 2: Pack and unpack a message in Java.\n\n    Foo foo =\
                    \ ...;\n    Any any = Any.pack(foo);\n    ...\n    if (any.is(Foo.class))\
                    \ {\n      foo = any.unpack(Foo.class);\n    }\n\n Example 3:\
                    \ Pack and unpack a message in Python.\n\n    foo = Foo(...)\n\
                    \    any = Any()\n    any.Pack(foo)\n    ...\n    if any.Is(Foo.DESCRIPTOR):\n\
                    \      any.Unpack(foo)\n      ...\n\n Example 4: Pack and unpack\
                    \ a message in Go\n\n     foo := &pb.Foo{...}\n     any, err :=\
                    \ anypb.New(foo)\n     if err != nil {\n       ...\n     }\n \
                    \    ...\n     foo := &pb.Foo{}\n     if err := any.UnmarshalTo(foo);\
                    \ err != nil {\n       ...\n     }\n\nThe pack methods provided\
                    \ by protobuf library will by default use\n'type.googleapis.com/full.type.name'\
                    \ as the type URL and the unpack\nmethods only use the fully qualified\
                    \ type name after the last '/'\nin the type URL, for example \"\
                    foo.bar.com/x/y.z\" will yield type\nname \"y.z\".\n\n\nJSON\n\
                    ====\nThe JSON representation of an `Any` value uses the regular\n\
                    representation of the deserialized, embedded message, with an\n\
                    additional field `@type` which contains the type URL. Example:\n\
                    \n    package google.profile;\n    message Person {\n      string\
                    \ first_name = 1;\n      string last_name = 2;\n    }\n\n    {\n\
                    \      \"@type\": \"type.googleapis.com/google.profile.Person\"\
                    ,\n      \"firstName\": <string>,\n      \"lastName\": <string>\n\
                    \    }\n\nIf the embedded message type is well-known and has a\
