                    status:
                      type: string
                      enum:
                      - PROPOSAL_STATUS_UNSPECIFIED
                      - PROPOSAL_STATUS_DEPOSIT_PERIOD
                      - PROPOSAL_STATUS_VOTING_PERIOD
                      - PROPOSAL_STATUS_PASSED
                      - PROPOSAL_STATUS_REJECTED
                      - PROPOSAL_STATUS_FAILED
                      default: PROPOSAL_STATUS_UNSPECIFIED
                      description: "ProposalStatus enumerates the valid statuses of\
                        \ a proposal.\n\n - PROPOSAL_STATUS_UNSPECIFIED: PROPOSAL_STATUS_UNSPECIFIED\
                        \ defines the default propopsal status.\n - PROPOSAL_STATUS_DEPOSIT_PERIOD:\
                        \ PROPOSAL_STATUS_DEPOSIT_PERIOD defines a proposal status\
                        \ during the deposit\nperiod.\n - PROPOSAL_STATUS_VOTING_PERIOD:\
                        \ PROPOSAL_STATUS_VOTING_PERIOD defines a proposal status\
                        \ during the voting\nperiod.\n - PROPOSAL_STATUS_PASSED: PROPOSAL_STATUS_PASSED\
                        \ defines a proposal status of a proposal that has\npassed.\n\
                        \ - PROPOSAL_STATUS_REJECTED: PROPOSAL_STATUS_REJECTED defines\
                        \ a proposal status of a proposal that has\nbeen rejected.\n\
                        \ - PROPOSAL_STATUS_FAILED: PROPOSAL_STATUS_FAILED defines\
                        \ a proposal status of a proposal that has\nfailed."
                    final_tally_result:
                      type: object
                      properties:
                        'yes':
                          type: string
                        abstain:
                          type: string
                        'no':
                          type: string
                        no_with_veto:
                          type: string
                      description: TallyResult defines a standard tally for a governance
                        proposal.
                    submit_time:
                      type: string
                      format: date-time
                    deposit_end_time:
                      type: string
                      format: date-time
                    total_deposit:
                      type: array
                      items:
                        type: object
                        properties:
                          denom:
                            type: string
                          amount:
                            type: string
                        description: 'Coin defines a token with a denomination and
                          an amount.


                          NOTE: The amount field is an Int which implements the custom
                          method

                          signatures required by gogoproto.'
                    voting_start_time:
                      type: string
                      format: date-time
                    voting_end_time:
                      type: string
                      format: date-time
                  description: Proposal defines the core field members of a governance
                    proposal.
              pagination:
                description: pagination defines the pagination in the response.
                type: object
                properties:
                  next_key:
                    type: string
                    format: byte
                    title: 'next_key is the key to be passed to PageRequest.key to

                      query the next page most efficiently'
                  total:
                    type: string
                    format: uint64
                    title: 'total is total number of results available if PageRequest.count_total

                      was set, its value is undefined otherwise'
            description: 'QueryProposalsResponse is the response type for the Query/Proposals
