                    ,\n      \"value\": \"1.212s\"\n    }"
      parameters:
      - name: params_type
        description: 'params_type defines which parameters to query for, can be one
          of "voting",

          "tallying" or "deposit".'
        in: path
        required: true
        type: string
      tags:
      - Query
