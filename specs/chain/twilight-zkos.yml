swagger: '2.0'
info:
  title: HTTP API Console — twilight-zkos
  version: '0.1.0'
  name: 'Twilight Protocol Zkos API'
  description: ''
paths:
  /twilight-project/nyks/zkos/mint_or_burn_trading_btc/{twilightAddress}:
    get:
      summary: Queries a list of MintOrBurnTradingBtc items.
      operationId: TwilightprojectNyksZkosMintOrBurnTradingBtc
      responses:
        '200':
          description: A successful response.
          schema:
            type: object
            properties:
              MintOrBurnTradingBtc:
                type: array
                items:
                  type: object
                  properties:
                    mintOrBurn:
                      type: boolean
                    btcValue:
                      type: string
                      format: uint64
                    qqAccount:
                      type: string
                    encryptScalar:
                      type: string
                    twilightAddress:
                      type: string
        default:
          description: An unexpected error response.
          schema:
            type: object
            properties:
              code:
                type: integer
                format: int32
              message:
                type: string
              details:
                type: array
                items:
                  type: object
                  properties:
                    '@type':
                      type: string
                  additionalProperties: {}
      parameters:
      - name: twilightAddress
        in: path
        required: true
        type: string
      tags:
      - Query
  /twilight-project/nyks/zkos/params:
    get:
      summary: Parameters queries the parameters of the module.
      operationId: TwilightprojectNyksZkosParams
      responses:
        '200':
          description: A successful response.
          schema:
            type: object
            properties:
              params:
                description: params holds all the parameters of this module.
                type: object
            description: QueryParamsResponse is response type for the Query/Params
              RPC method.
        default:
          description: An unexpected error response.
          schema:
            type: object
            properties:
              code:
                type: integer
                format: int32
              message:
                type: string
              details:
                type: array
                items:
                  type: object
                  properties:
                    '@type':
                      type: string
                  additionalProperties: {}
      tags:
      - Query
  /twilight-project/nyks/zkos/transfer_tx/{txId}:
    get:
      summary: Queries a list of TransferTx items.
      operationId: TwilightprojectNyksZkosTransferTx
      responses:
        '200':
          description: A successful response.
          schema:
            type: object
            properties:
              TransferTx:
                type: object
                properties:
                  txId:
                    type: string
                  txByteCode:
                    type: string
                  txFee:
                    type: string
                    format: uint64
                  zkOracleAddress:
                    type: string
        default:
          description: An unexpected error response.
          schema:
            type: object
            properties:
              code:
                type: integer
                format: int32
              message:
                type: string
              details:
                type: array
                items:
                  type: object
                  properties:
                    '@type':
                      type: string
                  additionalProperties: {}
      parameters:
      - name: txId
        in: path
        required: true
        type: string
      tags:
      - Query
definitions: {}
