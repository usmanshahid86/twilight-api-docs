swagger: '2.0'
info:
  title: HTTP API Console — twilight-volt
  name: ''
  description: ''
paths:
  /twilight-project/nyks/volt/btc_reserve:
    get:
      summary: Queries a list of BtcReserve items.
      operationId: TwilightprojectNyksVoltBtcReserve
      responses:
        '200':
          description: A successful response.
          schema:
            type: object
            properties:
              BtcReserves:
                type: array
                items:
                  type: object
                  properties:
                    ReserveId:
                      type: string
                      format: uint64
                    ReserveAddress:
                      type: string
                    JudgeAddress:
                      type: string
                    BtcRelayCapacityValue:
                      type: string
                      format: uint64
                    TotalValue:
                      type: string
                      format: uint64
                    PrivatePoolValue:
                      type: string
                      format: uint64
                    PublicValue:
                      type: string
                      format: uint64
                    FeePool:
                      type: string
                      format: uint64
                    UnlockHeight:
                      type: string
                      format: uint64
                    RoundId:
                      type: string
                      format: uint64
                  title: "BtcReserve is a mapping of a validator address to a reserve\
                    \ ID\nIt holds other values in the reserve struct such as total\
                    \ \nvalue, private pool value, public pool value, and the btc\
                    \ relay capacity value"
        default:
          description: An unexpected error response.
          schema:
            type: object
            properties:
              code:
                type: integer
                format: int32
              message:
                type: string
              details:
                type: array
                items:
                  type: object
                  properties:
                    '@type':
                      type: string
                  additionalProperties: {}
      tags:
      - Query
  /twilight-project/nyks/volt/btc_withdraw_request/{twilightAddress}:
    get:
      summary: Queries a list of BtcWithdrawRequest items.
      operationId: TwilightprojectNyksVoltBtcWithdrawRequest
      responses:
        '200':
          description: A successful response.
          schema:
            type: object
            properties:
              BtcWithdrawRequest:
                type: object
                properties:
                  withdrawIdentifier:
                    type: integer
                    format: int64
                  withdrawAddress:
                    type: string
                  withdrawReserveId:
                    type: string
                    format: uint64
                  withdrawAmount:
                    type: string
                    format: uint64
                    title: in satoshis
                  twilightAddress:
                    type: string
                  isConfirmed:
                    type: boolean
                  CreationTwilightBlockHeight:
                    type: string
                    format: int64
                title: Chain creates an internal mapping with identifier and bool
                  confirmed
        default:
          description: An unexpected error response.
          schema:
            type: object
            properties:
              code:
                type: integer
                format: int32
              message:
                type: string
              details:
                type: array
                items:
                  type: object
                  properties:
                    '@type':
                      type: string
                  additionalProperties: {}
      parameters:
      - name: twilightAddress
        in: path
        required: true
        type: string
      - name: reserveId
        in: query
        required: false
        type: string
        format: uint64
      - name: btcAddress
        in: query
        required: false
        type: string
      - name: withdrawAmount
        in: query
        required: false
        type: string
        format: uint64
      tags:
      - Query
  /twilight-project/nyks/volt/clearing_account/{twilightAddress}:
    get:
      summary: Queries a list of ClearingAccount items.
      operationId: TwilightprojectNyksVoltClearingAccount
      responses:
        '200':
          description: A successful response.
          schema:
            type: object
            properties:
              ClearingAccount:
                type: object
                properties:
                  TwilightAddress:
                    type: string
                  BtcDepositAddress:
                    type: string
                  BtcDepositAddressIdentifier:
                    type: integer
                    format: int64
                  BtcWithdrawAddress:
                    type: string
                  BtcWithdrawAddressIdentifier:
                    type: integer
                    format: int64
                  ReserveAccountBalances:
                    type: array
                    items:
                      type: object
                      properties:
                        ReserveId:
                          type: string
                          format: uint64
                        Amount:
                          type: string
                          format: uint64
                title: ClearingAccount is used to keep a mapping of how a user's addresses
                  and its reserve account balances
        default:
          description: An unexpected error response.
          schema:
            type: object
            properties:
              code:
                type: integer
                format: int32
              message:
                type: string
              details:
                type: array
                items:
                  type: object
                  properties:
                    '@type':
                      type: string
                  additionalProperties: {}
      parameters:
      - name: twilightAddress
        in: path
        required: true
        type: string
      tags:
      - Query
  /twilight-project/nyks/volt/fragment_by_id/{fragmentId}:
    get:
      summary: Queries a list of FragmentById items.
      operationId: TwilightprojectNyksVoltFragmentById
      responses:
        '200':
          description: A successful response.
          schema:
            type: object
            properties:
              Fragment:
                type: object
                properties:
                  FragmentId:
                    type: string
                    format: uint64
                  FragmentStatus:
                    type: boolean
                  JudgeAddress:
                    type: string
                  JudgeStatus:
                    type: boolean
                  Signers:
                    type: array
                    items:
                      type: object
                      properties:
                        FragmentID:
                          type: string
                          format: uint64
                        SignerAddress:
                          type: string
                        SignerStatus:
                          type: boolean
                        SignerBtcPublicKey:
                          type: string
                        SignerApplicationFee:
                          type: string
                          format: uint64
                        SignerFeeBips:
                          type: string
                          format: uint64
                  SignerApplicationFee:
                    type: string
                    format: uint64
                  Threshold:
                    type: string
                    format: uint64
                  FeePool:
                    type: string
                    format: uint64
                  FragmentFeeBips:
                    type: string
                    format: uint64
                  arbitraryData:
                    type: string
                  ReserveIds:
                    type: array
                    items:
                      type: string
                      format: uint64
        default:
          description: An unexpected error response.
          schema:
            type: object
            properties:
              code:
                type: integer
                format: int32
              message:
                type: string
              details:
                type: array
                items:
                  type: object
                  properties:
                    '@type':
                      type: string
                  additionalProperties: {}
      parameters:
      - name: fragmentId
        in: path
        required: true
        type: string
        format: uint64
      tags:
      - Query
  /twilight-project/nyks/volt/get_all_fragments:
    get:
      summary: Queries a list of GetAllFragments items.
      operationId: TwilightprojectNyksVoltGetAllFragments
      responses:
        '200':
          description: A successful response.
          schema:
            type: object
            properties:
              Fragments:
                type: array
                items:
                  type: object
                  properties:
                    FragmentId:
                      type: string
                      format: uint64
                    FragmentStatus:
                      type: boolean
                    JudgeAddress:
                      type: string
                    JudgeStatus:
                      type: boolean
                    Signers:
                      type: array
                      items:
                        type: object
                        properties:
                          FragmentID:
                            type: string
                            format: uint64
                          SignerAddress:
                            type: string
                          SignerStatus:
                            type: boolean
                          SignerBtcPublicKey:
                            type: string
                          SignerApplicationFee:
                            type: string
                            format: uint64
                          SignerFeeBips:
                            type: string
                            format: uint64
                    SignerApplicationFee:
                      type: string
                      format: uint64
                    Threshold:
                      type: string
                      format: uint64
                    FeePool:
                      type: string
                      format: uint64
                    FragmentFeeBips:
                      type: string
                      format: uint64
                    arbitraryData:
                      type: string
                    ReserveIds:
                      type: array
                      items:
                        type: string
                        format: uint64
        default:
          description: An unexpected error response.
          schema:
            type: object
            properties:
              code:
                type: integer
                format: int32
              message:
                type: string
              details:
                type: array
                items:
                  type: object
                  properties:
                    '@type':
                      type: string
                  additionalProperties: {}
      tags:
      - Query
  /twilight-project/nyks/volt/params:
    get:
      summary: Parameters queries the parameters of the module.
      operationId: TwilightprojectNyksVoltParams
      responses:
        '200':
          description: A successful response.
          schema:
            type: object
            properties:
              params:
                description: params holds all the parameters of this module.
                type: object
            description: QueryParamsResponse is response type for the Query/Params
              RPC method.
        default:
          description: An unexpected error response.
          schema:
            type: object
            properties:
              code:
                type: integer
                format: int32
              message:
                type: string
              details:
                type: array
                items:
                  type: object
                  properties:
                    '@type':
                      type: string
                  additionalProperties: {}
      tags:
      - Query
  /twilight-project/nyks/volt/refund_tx_snapshot/{reserveId}/{roundId}:
    get:
      summary: Queries a list of RefundTxSnapshot items.
      operationId: TwilightprojectNyksVoltRefundTxSnapshot
      responses:
        '200':
          description: A successful response.
          schema:
            type: object
            properties:
              RefundTxSnapshot:
                type: object
                properties:
                  ReserveId:
                    type: string
                    format: uint64
                  RoundId:
                    type: string
                    format: uint64
                  refundAccounts:
                    type: array
                    items:
                      type: object
                      properties:
                        Amount:
                          type: string
                          format: uint64
                        BtcDepositAddress:
                          type: string
                        BtcDepositAddressIdentifier:
                          type: integer
                          format: int64
                      title: RefundTxSnap is used to keep a mapping of the last refund
                        transaction for a reserve
                  EndBlockerHeightTwilight:
                    type: string
                    format: int64
                title: LastRefundTxSnapshot is a snapshot of the last refund for this
                  reserve id
        default:
          description: An unexpected error response.
          schema:
            type: object
            properties:
              code:
                type: integer
                format: int32
              message:
                type: string
              details:
                type: array
                items:
                  type: object
                  properties:
                    '@type':
                      type: string
                  additionalProperties: {}
      parameters:
      - name: reserveId
        in: path
        required: true
        type: string
        format: uint64
      - name: roundId
        in: path
        required: true
        type: string
        format: uint64
      tags:
      - Query
  /twilight-project/nyks/volt/reserve_clearing_accounts_all/{reserveId}:
    get:
      summary: Queries a list of ReserveClearingAccountsAll items.
      operationId: TwilightprojectNyksVoltReserveClearingAccountsAll
      responses:
        '200':
          description: A successful response.
          schema:
            type: object
            properties:
              ReserveClearingAccountsAll:
                type: array
                items:
                  type: object
                  properties:
                    TwilightAddress:
                      type: string
                    BtcDepositAddress:
                      type: string
                    BtcDepositAddressIdentifier:
                      type: integer
                      format: int64
                    BtcWithdrawAddress:
                      type: string
                    BtcWithdrawAddressIdentifier:
                      type: integer
                      format: int64
                    ReserveAccountBalances:
                      type: array
                      items:
                        type: object
                        properties:
                          ReserveId:
                            type: string
                            format: uint64
                          Amount:
                            type: string
                            format: uint64
                  title: ClearingAccount is used to keep a mapping of how a user's
                    addresses and its reserve account balances
        default:
          description: An unexpected error response.
          schema:
            type: object
            properties:
              code:
                type: integer
                format: int32
              message:
                type: string
              details:
                type: array
                items:
                  type: object
                  properties:
                    '@type':
                      type: string
                  additionalProperties: {}
      parameters:
      - name: reserveId
        in: path
        required: true
        type: string
        format: uint64
      tags:
      - Query
  /twilight-project/nyks/volt/reserve_withdraw_pool/{reserveId}:
    get:
      summary: Queries a list of ReserveWithdrawPool items.
      operationId: TwilightprojectNyksVoltReserveWithdrawPool
      responses:
        '200':
          description: A successful response.
          schema:
            type: object
            properties:
              ReserveWithdrawPool:
                type: object
                properties:
                  ReserveID:
                    type: string
                    format: uint64
                  RoundID:
                    type: string
                    format: uint64
                  processingWithdrawIdentifiers:
                    type: array
                    items:
                      type: integer
                      format: int64
                    title: Currently being processed
                  queuedWithdrawIdentifiers:
                    type: array
                    items:
                      type: integer
                      format: int64
                    title: Waiting to be processed
                  currentProcessingIndex:
                    type: integer
                    format: int64
                    title: Index of the last processed withdraw
        default:
          description: An unexpected error response.
          schema:
            type: object
            properties:
              code:
                type: integer
                format: int32
              message:
                type: string
              details:
                type: array
                items:
                  type: object
                  properties:
                    '@type':
                      type: string
                  additionalProperties: {}
      parameters:
      - name: reserveId
        in: path
        required: true
        type: string
        format: uint64
      tags:
      - Query
  /twilight-project/nyks/volt/reserve_withdraw_snapshot/{reserveId}/{roundId}:
    get:
      summary: Queries a list of ReserveWithdrawSnapshot items.
      operationId: TwilightprojectNyksVoltReserveWithdrawSnapshot
      responses:
        '200':
          description: A successful response.
          schema:
            type: object
            properties:
              ReserveWithdrawSnapshot:
                type: object
                properties:
                  ReserveId:
                    type: string
                    format: uint64
                  RoundId:
                    type: string
                    format: uint64
                  withdrawRequests:
                    type: array
                    items:
                      type: object
                      properties:
                        withdrawIdentifier:
                          type: integer
                          format: int64
                        withdrawAddress:
                          type: string
                        withdrawAmount:
                          type: string
                          format: uint64
                      title: WithdrawRequestSnap is a snapshot of the withdraw request
                  EndBlockerHeightTwilight:
                    type: string
                    format: int64
                title: ReserveWithdrawSnapshot is a snapshot of the reserve withdraw,
                  its used in sweep to know which withdraws are currently being processed
        default:
          description: An unexpected error response.
          schema:
            type: object
            properties:
              code:
                type: integer
                format: int32
              message:
                type: string
              details:
                type: array
                items:
                  type: object
                  properties:
                    '@type':
                      type: string
                  additionalProperties: {}
      parameters:
      - name: reserveId
        in: path
        required: true
        type: string
        format: uint64
      - name: roundId
        in: path
        required: true
        type: string
        format: uint64
      tags:
      - Query
  /twilight-project/nyks/volt/signer_applications/{fragmentId}:
    get:
      summary: Queries a list of SignerApplications items.
      operationId: TwilightprojectNyksVoltSignerApplications
      responses:
        '200':
          description: A successful response.
          schema:
            type: object
            properties:
              SignerApplications:
                type: array
                items:
                  type: object
                  properties:
                    applicationId:
                      type: string
                      format: uint64
                    fragmentId:
                      type: string
                      format: uint64
                    applicationFee:
                      type: string
                      format: uint64
                    feeBips:
                      type: string
                      format: uint64
                    btcPubKey:
                      type: string
                    signerAddress:
                      type: string
        default:
          description: An unexpected error response.
          schema:
            type: object
            properties:
              code:
                type: integer
                format: int32
              message:
                type: string
              details:
                type: array
                items:
                  type: object
                  properties:
                    '@type':
                      type: string
                  additionalProperties: {}
      parameters:
      - name: fragmentId
        in: path
        required: true
        type: string
        format: uint64
      tags:
      - Query
definitions: {}
